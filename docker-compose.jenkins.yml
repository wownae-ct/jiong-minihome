services:
  jenkins:
    image: jenkins/jenkins:lts
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
    volumes:
      - /mnt/jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    environment:
      - JAVA_OPTS=-Djava.awt.headless=true
